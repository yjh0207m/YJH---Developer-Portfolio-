name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'portfolio-back/**'
      - '.github/workflows/backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: portfolio-back
        run: ./mvnw clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create deployment package
        working-directory: portfolio-back
        run: |
          mkdir -p deploy
          cp target/portfolio-back-*.jar deploy/app.jar
          printf 'web: java -jar app.jar\n' > deploy/Procfile
          cd deploy && zip -r ../deploy.zip .

      - name: Upload artifact to S3
        working-directory: portfolio-back
        run: |
          aws s3 cp deploy.zip \
            s3://${{ secrets.EB_S3_BUCKET }}/portfolio-back/${{ github.sha }}.zip

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --version-label ${{ github.sha }} \
            --source-bundle \
              S3Bucket=${{ secrets.EB_S3_BUCKET }},\
              S3Key=portfolio-back/${{ github.sha }}.zip

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name ${{ secrets.EB_ENV_NAME }} \
            --version-label ${{ github.sha }}

      - name: Wait for environment to be ready
        run: |
          aws elasticbeanstalk wait environment-updated \
            --environment-names ${{ secrets.EB_ENV_NAME }}
